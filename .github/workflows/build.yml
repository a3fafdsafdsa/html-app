name: Build Signed APK + IPA Full
run-name: Full Build Signed APK & IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ANDROID_ROOT: $GITHUB_WORKSPACE/android
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_DIR: $GITHUB_WORKSPACE/output
      KEYSTORE_FILE: $GITHUB_WORKSPACE/temp.jks
      KEYSTORE_PASS: Test@666888
      KEY_ALIAS: testkey
      KEY_PASS: Test@666888
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: NPM Mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Dist
        run: npm run build

      # 重建双平台
      - name: Create Native Projects
        run: |
          rm -rf ios android
          npx cap add android
          npx cap add ios

      # 自动生成APP图标
      - name: Generate Icons
        run: npm run assets

      # 修复安卓目录
      - name: Fix Android Assets
        run: mkdir -p ${{ env.ANDROID_ROOT }}/app/src/main/assets

      - name: Cap Sync
        run: npx cap sync

      # 修复新版Capacitor Java21 → 兼容JDK17
      - name: Fix Gradle Java Version
        run: |
          sed -i '' 's|VERSION_21|VERSION_17|g' ${{ env.ANDROID_ROOT }}/app/build.gradle

      # 自动生成临时签名证书
      - name: Generate Temp Keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ env.KEYSTORE_FILE }} \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ env.KEYSTORE_PASS }} \
            -keypass ${{ env.KEY_PASS }} \
            -dname "CN=User, OU=Dev, O=Dev, L=HZ, S=ZJ, C=CN"

      # 动态注入签名配置
      - name: Inject Release Signing
        run: |
          cat >> ${{ env.ANDROID_ROOT }}/app/build.gradle <<EOF

android {
    signingConfigs {
        releaseTemp {
            storeFile file("${{ env.KEYSTORE_FILE }}")
            storePassword "${{ env.KEYSTORE_PASS }}"
            keyAlias "${{ env.KEY_ALIAS }}"
            keyPassword "${{ env.KEY_PASS }}"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.releaseTemp
        }
    }
}
EOF

      - name: Setup JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 编译【已签名APK】
      - name: Build Signed APK
        run: |
          cd ${{ env.ANDROID_ROOT }}
          chmod +x gradlew
          ./gradlew assembleRelease

      # iOS 编译
      - name: Xcode Archive iOS
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      # 手动打包IPA（无签名报错）
      - name: Build IPA
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}/Payload
          cp -r "${{ env.ARCHIVE_PATH }}/Products/Applications/App.app" "${{ env.OUTPUT_DIR }}/Payload/"
          cd ${{ env.OUTPUT_DIR }}
          zip -q -r App.ipa Payload
          rm -rf Payload

      # 复制成品
      - name: Copy Outputs
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cp ${{ env.ANDROID_ROOT }}/app/build/outputs/apk/release/app-release.apk ${{ env.OUTPUT_DIR }}/

      # 上传下载包
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 乐盈-成品包
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30
