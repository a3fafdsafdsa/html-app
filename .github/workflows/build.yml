name: Build Only iOS(Unsigned) Skip Android
run-name: Skip Android | Build Unsigned IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      IOS_ROOT: $GITHUB_WORKSPACE/ios/App
      ARCHIVE_PATH: $GITHUB_WORKSPACE/build/App.xcarchive
      OUTPUT_FOLDER: $GITHUB_WORKSPACE/output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set npm mirror
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      # 重建iOS SPM原生工程
      - name: Generate iOS SPM Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      ##############################
      # ARCHIVE 归档（成功，之前这一步一直没问题）
      ##############################
      - name: Xcode Archive
        run: |
          cd ${{ env.IOS_ROOT }}
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ env.ARCHIVE_PATH }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      ##############################
      # 【关键改动】不使用xcodebuild导出IPA！
      # 直接从xcarchive取出.app，手动构建IPA，完全避开teamID校验
      ##############################
      - name: Manual build IPA (Bypass Xcode export team check)
        run: |
          mkdir -p ${{ env.OUTPUT_FOLDER }}/Payload
          cp -r "${{ env.ARCHIVE_PATH }}/Products/Applications/App.app" "${{ env.OUTPUT_FOLDER }}/Payload/"
          cd ${{ env.OUTPUT_FOLDER }}
          zip -q -r App.ipa Payload
          rm -rf Payload

      # 上传产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Unsigned-IPA
          path: ${{ env.OUTPUT_FOLDER }}/App.ipa
          retention-days: 14
